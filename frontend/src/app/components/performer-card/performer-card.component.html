<article class="performer-card">
  <div class="performer-media">
    <span class="badge" *ngIf="featured || performer.has_top_pick_badge">Top izbor</span>
    <span class="badge" *ngIf="!featured && !performer.has_top_pick_badge && performer.has_featured_badge" style="background:#5c6bc0">Istaknuto</span>
    <span class="badge" *ngIf="performer.has_verified_badge" style="background:#2e7d32;right:12px;left:auto">Verifikovano</span>
    <span class="badge" *ngIf="performer.busy" style="background:#b23b3b;top:auto;bottom:12px;left:12px">Zauzeto na ovaj datum</span>
    <button class="fav" [class.favorited]="favorited" (click)="toggleFavorite($event)" aria-label="Sačuvaj">{{ favorited ? '♥' : '♡' }}</button>
    <img [src]="performer.profile_image_url || 'https://picsum.photos/seed/' + performer.id + '/380/460'" [alt]="performer.stage_name">
  </div>
  <div class="performer-body">
    <h3>{{ performer.stage_name }}</h3>
    <p class="performer-city">{{ performer.city }}</p>
    <div class="performer-meta">
      <span class="rating">★ {{ performer.rating_avg.toFixed(1) }} <em>({{ performer.rating_count }})</em></span>
      <span class="price">od {{ performer.price_from }} €</span>
    </div>
    <a routerLink="/izvodjac/{{ performer.id }}" class="performer-link">Pogledaj profil</a>
  </div>
</article>
