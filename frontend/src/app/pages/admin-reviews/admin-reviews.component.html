<div>
  <h1 style="font-size:24px;margin-bottom:24px">Recenzije</h1>

  <div *ngIf="loading" class="muted">Učitavanje...</div>
  <div *ngIf="!loading && reviews.length === 0" class="muted">Nema recenzija.</div>

  <div class="table-scroll" *ngIf="!loading && reviews.length > 0">
  <table style="width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden">
    <thead>
      <tr style="background:rgba(255,255,255,0.05);text-align:left">
        <th style="padding:12px 16px;font-size:13px;color:var(--text-muted)">Izvođač</th>
        <th style="padding:12px 16px;font-size:13px;color:var(--text-muted)">Korisnik</th>
        <th style="padding:12px 16px;font-size:13px;color:var(--text-muted)">Ocena</th>
        <th style="padding:12px 16px;font-size:13px;color:var(--text-muted)">Komentar</th>
        <th style="padding:12px 16px;font-size:13px;color:var(--text-muted)">Status</th>
        <th style="padding:12px 16px;font-size:13px;color:var(--text-muted)">Akcija</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of reviews" style="border-top:1px solid rgba(255,255,255,0.08)">
        <td style="padding:12px 16px;font-weight:500;color:var(--text)">{{ r.performers?.stage_name || 'Nepoznat' }}</td>
        <td style="padding:12px 16px;color:var(--text)">{{ r.profiles?.full_name || 'Nepoznat' }}</td>
        <td style="padding:12px 16px;color:var(--text)">★ {{ r.rating }}</td>
        <td style="padding:12px 16px;font-size:13px;color:var(--text-muted);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ r.comment }}</td>
        <td style="padding:12px 16px">
          <span style="padding:2px 10px;border-radius:12px;font-size:12px"
            [style.background]="r.status === 'visible' ? 'rgba(46,125,50,0.15)' : 'rgba(255,255,255,0.05)'"
            [style.color]="r.status === 'visible' ? '#81c784' : 'var(--text-muted)'">
            {{ r.status === 'visible' ? 'Vidljivo' : 'Sakriveno' }}
          </span>
        </td>
        <td style="padding:12px 16px">
          <button (click)="toggleVisibility(r)"
            style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px"
            [style.background]="r.status === 'visible' ? 'rgba(198,40,40,0.2)' : 'rgba(46,125,50,0.15)'"
            [style.color]="r.status === 'visible' ? '#ef9a9a' : '#81c784'">
            {{ r.status === 'visible' ? 'Sakrij' : 'Prikaži' }}
          </button>
        </td>
      </tr>
    </tbody>
  </table>
  </div>
</div>
