<div>
  <h1 style="font-size:24px;margin-bottom:24px">Recenzije</h1>

  <div *ngIf="loading" class="muted">Učitavanje...</div>
  <div *ngIf="!loading && reviews.length === 0" class="muted">Nema recenzija.</div>

  <table *ngIf="!loading && reviews.length > 0" style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)">
    <thead>
      <tr style="background:#f8f9fa;text-align:left">
        <th style="padding:12px 16px;font-size:13px;color:#888">Izvođač</th>
        <th style="padding:12px 16px;font-size:13px;color:#888">Korisnik</th>
        <th style="padding:12px 16px;font-size:13px;color:#888">Ocena</th>
        <th style="padding:12px 16px;font-size:13px;color:#888">Komentar</th>
        <th style="padding:12px 16px;font-size:13px;color:#888">Status</th>
        <th style="padding:12px 16px;font-size:13px;color:#888">Akcija</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of reviews" style="border-top:1px solid #f0f0f0">
        <td style="padding:12px 16px;font-weight:500">{{ r.performers?.stage_name || 'Nepoznat' }}</td>
        <td style="padding:12px 16px">{{ r.profiles?.full_name || 'Nepoznat' }}</td>
        <td style="padding:12px 16px">★ {{ r.rating }}</td>
        <td style="padding:12px 16px;font-size:13px;color:#555;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ r.comment }}</td>
        <td style="padding:12px 16px">
          <span style="padding:2px 10px;border-radius:12px;font-size:12px"
            [style.background]="r.status === 'visible' ? '#e8f5e9' : '#f5f5f5'"
            [style.color]="r.status === 'visible' ? '#2e7d32' : '#888'">
            {{ r.status === 'visible' ? 'Vidljivo' : 'Sakriveno' }}
          </span>
        </td>
        <td style="padding:12px 16px">
          <button (click)="toggleVisibility(r)"
            style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px"
            [style.background]="r.status === 'visible' ? '#ffebee' : '#e8f5e9'"
            [style.color]="r.status === 'visible' ? '#c62828' : '#2e7d32'">
            {{ r.status === 'visible' ? 'Sakrij' : 'Prikaži' }}
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
