<section class="section">
  <div class="wrap">
    <div class="inquiry-layout" *ngIf="!sent; else successState">
      <div class="inquiry-form">
        <h2>Kontakt</h2>
        <p class="muted" style="margin-bottom:24px">Imate pitanje? Pišite nam.</p>

        <div class="form-group">
          <label>Ime i prezime</label>
          <input type="text" [(ngModel)]="form.name" class="form-input" placeholder="Vaše ime">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="form.email" class="form-input" placeholder="vas@email.com">
        </div>
        <div class="form-group">
          <label>Poruka</label>
          <textarea [(ngModel)]="form.message" class="form-input form-textarea" rows="5" placeholder="Vaša poruka..."></textarea>
        </div>
        <button class="btn btn-gold" (click)="submit()" [disabled]="!form.name || !form.email || !form.message">Pošalji</button>
      </div>

      <aside class="inquiry-sidebar">
        <div class="inquiry-performer-card">
          <h3>Muzika na Klik</h3>
          <p class="muted">Email: info&#64;muzikanaklik.rs</p>
          <p class="muted">Tel: +381 6X XXX XXXX</p>
        </div>
      </aside>
    </div>

    <ng-template #successState>
      <div class="success-message">
        <h2>Poruka je poslata!</h2>
        <p class="muted">Odgovorićemo vam u najkraćem roku.</p>
      </div>
    </ng-template>
  </div>
</section>
