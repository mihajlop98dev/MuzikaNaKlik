<section class="section">
  <div class="wrap">
    <h1 style="font-size:24px;margin-bottom:24px">Admin Dashboard</h1>

    <div class="dashboard-grid" *ngIf="!loading">
      <div class="dashboard-card"><h3>Izvođači</h3><p>{{ stats.total_performers }}</p></div>
      <div class="dashboard-card"><h3>Klijenti</h3><p>{{ stats.total_clients }}</p></div>
      <div class="dashboard-card"><h3>Na čekanju</h3><p>{{ stats.pending_performers }}</p></div>
      <div class="dashboard-card"><h3>Upiti (mesec)</h3><p>{{ stats.total_inquiries }}</p></div>
      <div class="dashboard-card"><h3>Aktivne pretplate</h3><p>{{ stats.active_subscriptions }}</p></div>
    </div>

    <div class="dashboard-nav">
      <a routerLink="/admin/izvodjaci" class="dashboard-nav-item">Izvođači na čekanju</a>
      <a routerLink="/admin/korisnici" class="dashboard-nav-item">Svi korisnici</a>
      <a routerLink="/admin/pretplate" class="dashboard-nav-item">Pretplate</a>
      <a routerLink="/admin/recenzije" class="dashboard-nav-item">Recenzije</a>
      <a routerLink="/admin/statistika" class="dashboard-nav-item">Statistika</a>
    </div>
  </div>
</section>
