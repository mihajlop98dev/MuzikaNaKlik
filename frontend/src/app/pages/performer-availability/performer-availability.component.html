<section class="section">
  <div class="wrap">
    <h2 style="font-size:24px;margin-bottom:8px">Slobodni termini</h2>
    <p class="muted" style="margin-bottom:24px;font-size:13px">Kliknite na datum: prvi klik označava slobodan, drugi zauzet, treći uklanja oznaku.</p>

    <div class="avail-calendar" *ngIf="!loading">
      <div class="avail-calendar-header">
        <button class="btn" (click)="prevMonth()">←</button>
        <strong>{{ monthLabel }}</strong>
        <button class="btn" (click)="nextMonth()">→</button>
      </div>

      <div class="avail-calendar-grid avail-calendar-weekdays">
        <span *ngFor="let w of weekdayLabels">{{ w }}</span>
      </div>

      <div class="avail-calendar-grid">
        <button
          *ngFor="let cell of calendarDays"
          type="button"
          class="avail-day"
          [class.empty]="!cell.inMonth"
          [class.past]="cell.isPast"
          [class.free]="cell.status === 'free'"
          [class.booked]="cell.status === 'booked'"
          [disabled]="!cell.inMonth || cell.isPast"
          (click)="dayClick(cell)"
        >{{ cell.inMonth ? cell.day : '' }}</button>
      </div>

      <div class="avail-legend">
        <span><i class="avail-dot free"></i>Slobodno</span>
        <span><i class="avail-dot booked"></i>Zauzeto</span>
        <span><i class="avail-dot"></i>Nije postavljeno</span>
      </div>
    </div>
  </div>
</section>
